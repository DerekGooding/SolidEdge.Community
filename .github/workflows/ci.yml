name: CI

on:
  push:
    branches: [ master, main, Net10 ]
  pull_request:
    branches: [ master, main, Net10 ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore src/SolidEdgeCommunity.sln

    - name: Build
      run: dotnet build src/SolidEdgeCommunity.sln --configuration Release --no-restore

    - name: Test
      run: dotnet test src/SolidEdgeCommunity.sln --configuration Release --no-build --verbosity normal
